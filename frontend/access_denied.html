<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Denied</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #081018;
      --card: #101a26;
      --border: rgba(64, 202, 255, 0.14);
      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.7);
      --accent: #00d4f5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: radial-gradient(circle at top, rgba(0,212,245,0.08), transparent 34%), var(--bg);
      color: var(--text);
      font-family: Inter, Arial, sans-serif;
    }
    .card {
      width: min(540px, 100%);
      padding: 32px;
      border-radius: 20px;
      background: var(--card);
      border: 1px solid var(--border);
      box-shadow: 0 22px 60px rgba(0,0,0,0.35);
    }
    .eyebrow {
      margin-bottom: 10px;
      color: var(--accent);
      font-size: 12px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 32px;
      line-height: 1;
    }
    p {
      margin: 0 0 12px;
      color: var(--muted);
      line-height: 1.6;
    }
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 22px;
    }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 16px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
    }
    .primary {
      background: var(--accent);
      color: #061018;
    }
    .secondary {
      border: 1px solid var(--border);
      color: var(--text);
      background: rgba(255,255,255,0.02);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">Midnight Access</div>
    <h1>We couldn’t open that workflow.</h1>
    <p id="reason-copy">Your account is authenticated, but this workspace is not currently available for your tenant.</p>
    <div class="actions">
      <a class="primary" href="/midnight_dashboard.html">Return to Dashboard</a>
      <a class="secondary" href="/onboarding/plan">Go to Onboarding</a>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const reason = params.get('reason');
    if (reason) {
      document.getElementById('reason-copy').textContent = reason;
    }
  </script>
</body>
</html>
