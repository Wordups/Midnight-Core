<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Training Module</title>
  <style>
    :root { color-scheme: dark; --bg:#081018; --card:#101a26; --border:rgba(64,202,255,.14); --text:rgba(255,255,255,.92); --muted:rgba(255,255,255,.7); --accent:#00d4f5; }
    * { box-sizing:border-box; }
    html, body { margin:0; width:100%; height:100%; background:var(--bg); }
    body { font-family:Inter, Arial, sans-serif; color:var(--text); }
    .workflow-shell { width:100%; height:100%; }
    iframe { width:100%; height:100%; border:0; display:none; background:var(--bg); }
    .workflow-ready iframe { display:block; }
    .workflow-ready .status { display:none; }
    .status { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .status-card { width:min(440px,100%); padding:28px; border-radius:18px; background:var(--card); border:1px solid var(--border); box-shadow:0 18px 48px rgba(0,0,0,.32); text-align:center; }
    .status-kicker { margin-bottom:10px; color:var(--accent); font-size:12px; letter-spacing:.24em; text-transform:uppercase; }
    .status-title { margin:0 0 10px; font-size:28px; line-height:1; }
    .status-copy { margin:0; color:var(--muted); line-height:1.6; }
  </style>
</head>
<body>
  <div class="workflow-shell" data-create-workflow-shell data-lane="TRAINING_MODULE" data-title="Create Training Module">
    <div class="status"><div class="status-card"><div class="status-kicker">Midnight Create</div><h1 class="status-title">Create Training Module</h1><p class="status-copy" data-create-workflow-status>Checking your Midnight workspace…</p></div></div>
    <iframe title="Create Training Module"></iframe>
  </div>
  <script src="/create_workflow_guard.js"></script>
</body>
</html>
