<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Midnight — System Status</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#070b12;--card:#0d141f;--border:#1b2433;--text:#e7ecf4;--text2:#9aa6b8;--text3:#5f6b7d;
        --green:#3fd68c;--amber:#f5a623;--red:#ff5c5c;--mono:'JetBrains Mono',monospace}
  body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;min-height:100vh;
       display:flex;flex-direction:column;align-items:center;padding:48px 20px}
  .wrap{width:100%;max-width:680px}
  .brand{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:.12em}
  .head{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
  .overall{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--border);
           border-radius:14px;padding:22px 24px;margin-bottom:18px}
  .dot{width:14px;height:14px;border-radius:50%;flex:0 0 auto}
  .dot.operational{background:var(--green);box-shadow:0 0 12px rgba(63,214,140,.5)}
  .dot.degraded{background:var(--amber);box-shadow:0 0 12px rgba(245,166,35,.5)}
  .dot.outage{background:var(--red);box-shadow:0 0 12px rgba(255,92,92,.5)}
  .dot.not_configured{background:var(--text3)}
  .overall h1{font-size:19px;font-weight:600}
  .overall .sub{font-size:12.5px;color:var(--text2);margin-top:2px}
  .row{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--border);
       border-radius:11px;padding:16px 20px;margin-bottom:10px}
  .row .name{font-weight:600;font-size:14px}
  .row .detail{font-size:12px;color:var(--text3);margin-top:1px}
  .row .state{margin-left:auto;font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.06em}
  .state.operational{color:var(--green)} .state.degraded{color:var(--amber)}
  .state.outage{color:var(--red)} .state.not_configured{color:var(--text3)}
  .meta{margin-top:22px;font-size:12px;color:var(--text3);font-family:var(--mono);text-align:center}
  a{color:var(--text2)}
</style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <div class="brand">MIDNIGHT</div>
      <div style="font-size:12px;color:var(--text3)">System Status</div>
    </div>
    <div class="overall">
      <span class="dot" id="overall-dot"></span>
      <div>
        <h1 id="overall-text">Checking status…</h1>
        <div class="sub" id="overall-sub">Fetching live service health</div>
      </div>
    </div>
    <div id="components"></div>
    <div class="meta">
      Auto-refreshes every 30s · last checked <span id="checked">—</span><br>
      <a href="/index.html">← Back to Midnight</a>
    </div>
  </div>
<script>
  const LABEL = {operational:'Operational', degraded:'Degraded', outage:'Outage', not_configured:'Not configured'};
  async function load(){
    try{
      const res = await fetch('/status', {cache:'no-store'});
      const data = await res.json();
      const dot = document.getElementById('overall-dot');
      dot.className = 'dot ' + data.overall;
      document.getElementById('overall-text').textContent =
        data.overall === 'operational' ? 'All systems operational' : 'Some systems degraded';
      document.getElementById('overall-sub').textContent =
        data.overall === 'operational' ? 'Midnight is running normally' : 'We are aware and monitoring';
      document.getElementById('components').innerHTML = (data.components||[]).map(c =>
        `<div class="row"><span class="dot ${c.status}"></span>`+
        `<div><div class="name">${c.name}</div><div class="detail">${c.detail||''}</div></div>`+
        `<span class="state ${c.status}">${LABEL[c.status]||c.status}</span></div>`).join('');
      document.getElementById('checked').textContent = new Date().toLocaleTimeString();
    }catch(e){
      document.getElementById('overall-dot').className = 'dot outage';
      document.getElementById('overall-text').textContent = 'Status unavailable';
      document.getElementById('overall-sub').textContent = 'Could not reach the status endpoint';
    }
  }
  load(); setInterval(load, 30000);
</script>
</body>
</html>
